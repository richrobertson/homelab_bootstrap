name: Terraform Validation

on:
  pull_request:
    branches: ["main", "master"]
    paths:
      - "terraform/**/*.tf"
      - ".github/workflows/terraform-validate.yml"
  push:
    branches: ["main", "master"]
    paths:
      - "terraform/**/*.tf"
      - ".github/workflows/terraform-validate.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: terraform-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      TF_IN_AUTOMATION: "true"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.0

      - name: Check Terraform formatting
        run: terraform fmt -check -diff -recursive terraform

      - name: Validate root Terraform entrypoint
        run: |
          terraform -chdir=terraform init -backend=false -lockfile=readonly -input=false -no-color
          terraform -chdir=terraform validate -no-color
