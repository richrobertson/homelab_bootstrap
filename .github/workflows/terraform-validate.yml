name: Terraform Validation

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: terraform-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: terraform-validate
    runs-on: ubuntu-latest
    env:
      TF_IN_AUTOMATION: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.13.3

      - name: Check Terraform formatting
        run: terraform fmt -check -diff -recursive terraform

      - name: Validate root Terraform entrypoint
        run: |
          terraform -chdir=terraform init -backend=false -input=false -no-color -lockfile=readonly
          terraform -chdir=terraform validate -no-color
